<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>User page</title>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="container-fluid">
  <!-- Шапка с пользователем -->
  <div class="row bg-dark text-white py-2" id="userHeader">
    <div class="col-3">
      <span id="currentUserInfo"></span>
    </div>
    <div class="col-7"></div>
    <div class="col-2 text-end">
      <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>

  <div class="row">
    <!-- Боковое меню -->
    <div class="col-2 bg-light min-vh-100 p-0">
      <div class="list-group list-group-flush">
        <a href="/admin" class="list-group-item list-group-item-action" id="adminLink" style="display: none;">Admin</a>
        <a href="/user" class="list-group-item list-group-item-action active">User</a>
      </div>
    </div>

    <!-- Информация о пользователе -->
    <div class="col-10 p-4">
      <h1 class="mb-4">User information page</h1>
      <div class="border rounded p-3 bg-light">
        <h5>About user</h5>
        <table class="table table-striped">
          <thead>
          <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
            <th>Email</th>
            <th>Role</th>
          </tr>
          </thead>
          <tbody id="userInfoTable">
          <tr>
            <td colspan="6" class="text-center">Loading...</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // Получаем CSRF токен из meta тегов
  const token = document.querySelector('meta[name="_csrf"]').getAttribute('content');
  const header = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

  // Функция для fetch с CSRF
  function fetchWithCsrf(url, options = {}) {
    options.headers = {
      ...options.headers,
      [header]: token,
      'Content-Type': 'application/json'
    };
    return fetch(url, options);
  }

  async function loadUserInfo() {
    try {
      // Загружаем информацию о текущем пользователе через /api/admin/current-user
      // (этот эндпоинт доступен и для USER, и для ADMIN)
      const response = await fetchWithCsrf('/api/admin/current-user');

      if (!response.ok) {
        throw new Error('Failed to load user data');
      }

      const user = await response.json();

      // Обновляем шапку
      document.getElementById('currentUserInfo').textContent =
              `${user.email} with roles: ${user.roles.map(r => r.name.replace('ROLE_', '')).join(' ')}`;

      // Показываем ссылку на админку если есть роль ADMIN
      if (user.roles.some(r => r.name === 'ROLE_ADMIN')) {
        document.getElementById('adminLink').style.display = 'block';
      }

      // Заполняем таблицу
      const tbody = document.getElementById('userInfoTable');
      tbody.innerHTML = `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.firstName || ''}</td>
                    <td>${user.lastName || '-'}</td>
                    <td>${user.age}</td>
                    <td>${user.email}</td>
                    <td>${user.roles.map(r => r.name.replace('ROLE_', '')).join(' ')}</td>
                </tr>
            `;
    } catch (error) {
      console.error('Error loading user info:', error);
      document.getElementById('userInfoTable').innerHTML = `
                <tr>
                    <td colspan="6" class="text-center text-danger">Error loading user data</td>
                </tr>
            `;
    }
  }

  // Загружаем данные при загрузке страницы
  document.addEventListener('DOMContentLoaded', loadUserInfo);
</script>
</body>
</html>

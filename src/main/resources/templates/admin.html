<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Admin page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous">
  </script>
</head>
<body>
<div class="container-fluid">
  <!-- Верхняя панель с пользователем -->
  <div class="row bg-dark text-white py-2">
    <div class="col-3" id="currentUserInfo">
      <!-- Заполняется через JavaScript -->
    </div>
    <div class="col-7"></div>
    <div class="col-2 text-end">
      <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>

  <div class="row">
    <!-- Боковое меню (слева) -->
    <div class="col-2 bg-light min-vh-100 p-0">
      <div class="list-group list-group-flush">
        <a href="/admin" class="list-group-item list-group-item-action active"
           sec:authorize="hasRole('ADMIN')">Admin</a>
        <a href="/user" class="list-group-item list-group-item-action">User</a>
      </div>
    </div>

    <!-- Основной контент (справа) -->
    <div class="col-10 p-4">
      <h1 class="mb-4">Admin page</h1>

      <!-- Табы -->
      <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="users-tab" data-bs-toggle="tab"
                  data-bs-target="#users" type="button" role="tab">Users table</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="newuser-tab" data-bs-toggle="tab"
                  data-bs-target="#newuser" type="button" role="tab">New User</button>
        </li>
      </ul>

      <!-- Контент табов -->
      <div class="tab-content p-4 border border-top-0 rounded-bottom" style="background-color: #f8f9fa;">
        <!-- Таб с таблицей пользователей -->
        <div class="tab-pane fade show active" id="users" role="tabpanel">
          <h3 class="mb-3">All users</h3>
          <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Age</th>
              <th>Email</th>
              <th>Role</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
            </thead>
            <tbody id="usersTableBody">
            <!-- Заполняется через JavaScript -->
            </tbody>
          </table>
        </div>

        <!-- Таб с формой добавления пользователя -->
        <div class="tab-pane fade" id="newuser" role="tabpanel">
          <h3 class="mb-3">Add new user</h3>
          <div class="row justify-content-center">
            <div class="col-md-6">
              <form id="addUserForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                  <label class="form-label">First name</label>
                  <input type="text" class="form-control" id="firstName" name="firstName" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Last name</label>
                  <input type="text" class="form-control" id="lastName" name="lastName" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Age</label>
                  <input type="number" class="form-control" id="age" name="age" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Role</label>
                  <select class="form-select" id="roles" name="roles" multiple size="2">
                    <!-- Заполняется через JavaScript -->
                  </select>
                  <small class="text-muted">Hold Ctrl to select multiple</small>
                </div>
                <div class="text-end">
                  <button type="submit" class="btn btn-primary">Add new user</button>
                  <button type="button" class="btn btn-secondary" onclick="clearAddForm()">Clear</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно для редактирования пользователя -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editModalLabel">Edit user</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editUserForm">
          <input type="hidden" id="editId" name="id">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div class="mb-3">
            <label class="form-label">First name</label>
            <input type="text" class="form-control" id="editFirstName" name="firstName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Last name</label>
            <input type="text" class="form-control" id="editLastName" name="lastName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="editAge" name="age" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="editEmail" name="email" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="editPassword" name="password"
                   placeholder="Leave blank to keep current">
          </div>

          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" id="editRoles" name="roles" multiple size="2">
              <!-- Заполняется через JavaScript -->
            </select>
            <small class="text-muted">Hold Ctrl to select multiple</small>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" onclick="updateUser()">Edit</button>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно для удаления пользователя -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteModalLabel">Delete user</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-3">Are you sure you want to delete this user?</p>

        <div class="border p-4 rounded bg-light">
          <div class="mb-3">
            <label class="form-label fw-bold">First name</label>
            <div class="form-control bg-white" id="deleteFirstName" style="background-color: #fff;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Last name</label>
            <div class="form-control bg-white" id="deleteLastName" style="background-color: #fff;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Age</label>
            <div class="form-control bg-white" id="deleteAge" style="background-color: #fff;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <div class="form-control bg-white" id="deleteEmail" style="background-color: #fff;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Role</label>
            <div class="form-control bg-white" id="deleteRole" style="background-color: #fff;"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-danger" onclick="deleteUser()">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- JavaScript -->
<script th:inline="javascript">
  let currentUserId = null;
  let allRoles = [];
  let usersData = [];

  // Загрузка данных при инициализации
  document.addEventListener('DOMContentLoaded', function() {
    loadCurrentUser();
    loadAllRoles();
    loadAllUsers();
  });

  // Загрузка текущего пользователя
  async function loadCurrentUser() {
    try {
      const response = await fetch('/api/admin/current-user');
      const user = await response.json();
      currentUserId = user.id;
      document.getElementById('currentUserInfo').innerHTML =
              `<span>${user.username} with roles: ${getRolesString(user.roles)}</span>`;
    } catch (error) {
      console.error('Error loading current user:', error);
    }
  }

  // Загрузка всех ролей
  async function loadAllRoles() {
    try {
      const response = await fetch('/api/admin/roles');
      allRoles = await response.json();

      // Заполняем select в форме добавления
      const rolesSelect = document.getElementById('roles');
      rolesSelect.innerHTML = '';
      allRoles.forEach(role => {
        const option = document.createElement('option');
        option.value = role.name;
        option.textContent = role.name.replace('ROLE_', '');
        rolesSelect.appendChild(option);
      });

      // Заполняем select в форме редактирования
      const editRolesSelect = document.getElementById('editRoles');
      editRolesSelect.innerHTML = '';
      allRoles.forEach(role => {
        const option = document.createElement('option');
        option.value = role.name;
        option.textContent = role.name.replace('ROLE_', '');
        editRolesSelect.appendChild(option);
      });
    } catch (error) {
      console.error('Error loading roles:', error);
    }
  }

  // Загрузка всех пользователей
  async function loadAllUsers() {
    try {
      const response = await fetch('/api/admin/users');
      usersData = await response.json();
      renderUsersTable(usersData);
    } catch (error) {
      console.error('Error loading users:', error);
    }
  }

  // Отображение таблицы пользователей
  function renderUsersTable(users) {
    const tbody = document.getElementById('usersTableBody');
    tbody.innerHTML = '';

    users.forEach(user => {
      const row = document.createElement('tr');
      row.innerHTML = `
                <td>${user.id}</td>
                <td>${user.firstName}</td>
                <td>${user.lastName}</td>
                <td>${user.age}</td>
                <td>${user.email}</td>
                <td>${getRolesString(user.roles)}</td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="openEditModal(${user.id})">Edit</button>
                </td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="openDeleteModal(${user.id})">Delete</button>
                </td>
            `;
      tbody.appendChild(row);
    });
  }

  // Получение строки с ролями
  function getRolesString(roles) {
    if (!roles || roles.length === 0) return '';
    return roles.map(role => role.name.replace('ROLE_', '')).join(' ');
  }

  // Очистка формы добавления
  function clearAddForm() {
    document.getElementById('addUserForm').reset();
  }

  // Добавление нового пользователя
  document.getElementById('addUserForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const selectedRoles = Array.from(document.getElementById('roles').selectedOptions)
            .map(option => option.value);

    console.log('Selected roles:', selectedRoles);

    const user = {
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      age: parseInt(document.getElementById('age').value),
      email: document.getElementById('email').value,
      username: document.getElementById('email').value,
      password: document.getElementById('password').value,
      roles: selectedRoles.map(roleName => ({ name: roleName }))
    };

    console.log('Sending user:', user);

    try {
      const csrfToken = document.querySelector('input[name="_csrf"]').value;
      const response = await fetch('/api/admin/users', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-TOKEN': csrfToken
        },
        body: JSON.stringify(user)
      });

      console.log('Response status:', response.status);

      if (response.ok) {
        const savedUser = await response.json();
        console.log('User saved:', savedUser);
        clearAddForm();
        await loadAllUsers();
        // Переключаемся на вкладку с таблицей
        document.getElementById('users-tab').click();
      } else {
        const errorText = await response.text();
        console.error('Error response:', errorText);
        alert('Error adding user: ' + response.status);
      }
    } catch (error) {
      console.error('Error adding user:', error);
      alert('Error adding user: ' + error.message);
    }
  });

  // Открытие модального окна для редактирования
  async function openEditModal(id) {
    try {
      const response = await fetch(`/api/admin/users/${id}`);
      const user = await response.json();

      document.getElementById('editId').value = user.id;
      document.getElementById('editFirstName').value = user.firstName;
      document.getElementById('editLastName').value = user.lastName;
      document.getElementById('editAge').value = user.age;
      document.getElementById('editEmail').value = user.email;
      document.getElementById('editPassword').value = '';

      // Выбираем роли пользователя
      const editRolesSelect = document.getElementById('editRoles');
      Array.from(editRolesSelect.options).forEach(option => {
        option.selected = user.roles.some(role => role.name === option.value);
      });

      new bootstrap.Modal(document.getElementById('editModal')).show();
    } catch (error) {
      console.error('Error loading user for edit:', error);
    }
  }

  // Обновление пользователя
  async function updateUser() {
    const selectedRoles = Array.from(document.getElementById('editRoles').selectedOptions)
            .map(option => option.value);

    const user = {
      id: parseInt(document.getElementById('editId').value),
      firstName: document.getElementById('editFirstName').value,
      lastName: document.getElementById('editLastName').value,
      age: parseInt(document.getElementById('editAge').value),
      email: document.getElementById('editEmail').value,
      username: document.getElementById('editEmail').value,
      roles: selectedRoles.map(roleName => ({ name: roleName }))
    };

    const password = document.getElementById('editPassword').value;
    if (password) {
      user.password = password;
    }

    console.log('Updating user:', user);

    try {
      const csrfToken = document.querySelector('input[name="_csrf"]').value;
      const response = await fetch(`/api/admin/users/${user.id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-TOKEN': csrfToken
        },
        body: JSON.stringify(user)
      });

      console.log('Update response status:', response.status);

      if (response.ok) {
        bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
        await loadAllUsers();
      } else {
        const errorText = await response.text();
        console.error('Error response:', errorText);
        alert('Error updating user: ' + response.status);
      }
    } catch (error) {
      console.error('Error updating user:', error);
      alert('Error updating user: ' + error.message);
    }
  }

  // Открытие модального окна для удаления
  async function openDeleteModal(id) {
    try {
      const response = await fetch(`/api/admin/users/${id}`);
      const user = await response.json();

      document.getElementById('deleteFirstName').textContent = user.firstName;
      document.getElementById('deleteLastName').textContent = user.lastName || '-';
      document.getElementById('deleteAge').textContent = user.age;
      document.getElementById('deleteEmail').textContent = user.email;
      document.getElementById('deleteRole').textContent = getRolesString(user.roles);

      currentUserId = id;
      new bootstrap.Modal(document.getElementById('deleteModal')).show();
    } catch (error) {
      console.error('Error loading user for delete:', error);
    }
  }

  // Удаление пользователя
  async function deleteUser() {
    try {
      const csrfToken = document.querySelector('input[name="_csrf"]').value;
      console.log('Deleting user with ID:', currentUserId);

      const response = await fetch(`/api/admin/users/${currentUserId}`, {
        method: 'DELETE',
        headers: {
          'X-CSRF-TOKEN': csrfToken
        }
      });

      console.log('Delete response status:', response.status);

      if (response.ok) {
        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
        await loadAllUsers();
      } else {
        const errorText = await response.text();
        console.error('Error response:', errorText);
        alert('Error deleting user: ' + response.status);
      }
    } catch (error) {
      console.error('Error deleting user:', error);
      alert('Error deleting user: ' + error.message);
    }
  }
</script>
</body>
</html>

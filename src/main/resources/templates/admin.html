<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="container-fluid">
  <!-- Верхняя панель с пользователем -->
  <div class="row bg-dark text-white py-2" id="userHeader">
    <div class="col-3">
      <span id="currentUserInfo"></span>
    </div>
    <div class="col-7"></div>
    <div class="col-2 text-end">
      <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>

  <div class="row">
    <!-- Боковое меню -->
    <div class="col-2 bg-light min-vh-100 p-0">
      <div class="list-group list-group-flush">
        <a href="/admin" class="list-group-item list-group-item-action active">Admin</a>
        <a href="/user" class="list-group-item list-group-item-action">User</a>
      </div>
    </div>

    <!-- Основной контент -->
    <div class="col-10 p-4">
      <h1 class="mb-4">Admin page</h1>

      <!-- Табы -->
      <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users">Users table</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="newuser-tab" data-bs-toggle="tab" data-bs-target="#newuser">New User</button>
        </li>
      </ul>

      <!-- Контент табов -->
      <div class="tab-content p-4 border border-top-0 rounded-bottom bg-light">
        <!-- Таблица пользователей -->
        <div class="tab-pane fade show active" id="users">
          <h3 class="mb-3">All users</h3>
          <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Age</th>
              <th>Email</th>
              <th>Role</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
            </thead>
            <tbody id="usersTableBody">
            <tr>
              <td colspan="8" class="text-center">Loading...</td>
            </tr>
            </tbody>
          </table>
        </div>

        <!-- Форма добавления пользователя -->
        <div class="tab-pane fade" id="newuser">
          <h3 class="mb-3">Add new user</h3>
          <div class="row justify-content-center">
            <div class="col-md-6">
              <form id="addUserForm">
                <div class="mb-3">
                  <label class="form-label">First Name</label>
                  <input type="text" class="form-control" id="addFirstName" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Last Name</label>
                  <input type="text" class="form-control" id="addLastName">
                </div>
                <div class="mb-3">
                  <label class="form-label">Age</label>
                  <input type="number" class="form-control" id="addAge" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="addEmail" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="addPassword" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Role</label>
                  <select class="form-select" id="addRoles" multiple size="2" required>
                    <!-- Роли будут загружены через JS -->
                  </select>
                  <small class="text-muted">Hold Ctrl to select multiple</small>
                </div>
                <div class="text-end">
                  <button type="submit" class="btn btn-primary">Add new user</button>
                  <button type="button" class="btn btn-secondary" data-bs-toggle="tab" data-bs-target="#users">Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно редактирования -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit user</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editUserForm">
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" id="editFirstName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" id="editLastName">
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="editAge" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="editEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" id="editPassword" placeholder="Leave blank to keep current">
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" id="editRoles" multiple size="2"></select>
            <small class="text-muted">Hold Ctrl to select multiple</small>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="saveEditBtn">Save changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete user</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this user?</p>
        <input type="hidden" id="deleteId">
        <div class="border p-3 rounded bg-light">
          <p><strong>First Name:</strong> <span id="deleteFirstName"></span></p>
          <p><strong>Last Name:</strong> <span id="deleteLastName"></span></p>
          <p><strong>Age:</strong> <span id="deleteAge"></span></p>
          <p><strong>Email:</strong> <span id="deleteEmail"></span></p>
          <p><strong>Role:</strong> <span id="deleteRole"></span></p>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API = {
    admin: '/api/admin',
    user: '/api/user'
  };

  // Получаем CSRF токен из meta тегов
  const token = document.querySelector('meta[name="_csrf"]').getAttribute('content');
  const header = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

  // Функция для fetch с CSRF
  function fetchWithCsrf(url, options = {}) {
    options.headers = {
      ...options.headers,
      [header]: token,
      'Content-Type': 'application/json'
    };
    return fetch(url, options);
  }

  // Загрузка текущего пользователя
  async function loadCurrentUser() {
    try {
      const response = await fetchWithCsrf(`${API.admin}/current-user`);
      if (!response.ok) throw new Error('Failed to load user');
      const user = await response.json();
      document.getElementById('currentUserInfo').textContent =
              `${user.email} with roles: ${user.roles.map(r => r.name.replace('ROLE_', '')).join(' ')}`;
    } catch (error) {
      console.error('Error loading current user:', error);
    }
  }

  // Загрузка всех ролей
  async function loadRoles() {
    try {
      const response = await fetchWithCsrf(`${API.admin}/roles`);
      if (!response.ok) throw new Error('Failed to load roles');
      const roles = await response.json();

      const addSelect = document.getElementById('addRoles');
      const editSelect = document.getElementById('editRoles');

      addSelect.innerHTML = '';
      editSelect.innerHTML = '';

      roles.forEach(role => {
        const option = document.createElement('option');
        option.value = role.id;
        option.textContent = role.name.replace('ROLE_', '');
        addSelect.appendChild(option.cloneNode(true));
        editSelect.appendChild(option.cloneNode(true));
      });
    } catch (error) {
      console.error('Error loading roles:', error);
    }
  }

  // Загрузка всех пользователей
  async function loadUsers() {
    try {
      const response = await fetchWithCsrf(`${API.admin}/users`);
      if (!response.ok) throw new Error('Failed to load users');
      const users = await response.json();

      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '';

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center">No users found</td></tr>';
        return;
      }

      users.forEach(user => {
        const row = tbody.insertRow();
        row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.firstName || ''}</td>
                    <td>${user.lastName || '-'}</td>
                    <td>${user.age}</td>
                    <td>${user.email}</td>
                    <td>${user.roles ? user.roles.map(r => r.name.replace('ROLE_', '')).join(' ') : ''}</td>
                    <td><button class="btn btn-primary btn-sm edit-btn" data-id="${user.id}">Edit</button></td>
                    <td><button class="btn btn-danger btn-sm delete-btn" data-id="${user.id}">Delete</button></td>
                `;
      });

      attachEventListeners();
    } catch (error) {
      console.error('Error loading users:', error);
      document.getElementById('usersTableBody').innerHTML =
              '<tr><td colspan="8" class="text-center text-danger">Error loading users</td></tr>';
    }
  }

  // Добавление пользователя
  document.getElementById('addUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const selectedRoles = Array.from(document.getElementById('addRoles').selectedOptions)
            .map(opt => ({ id: parseInt(opt.value), name: 'ROLE_' + opt.textContent }));

    const userData = {
      firstName: document.getElementById('addFirstName').value,
      lastName: document.getElementById('addLastName').value || '',
      age: parseInt(document.getElementById('addAge').value),
      email: document.getElementById('addEmail').value,
      password: document.getElementById('addPassword').value,
      roles: selectedRoles
    };

    try {
      const response = await fetchWithCsrf(`${API.admin}/users`, {
        method: 'POST',
        body: JSON.stringify(userData)
      });

      if (!response.ok) throw new Error('Failed to add user');

      e.target.reset();
      document.querySelector('[data-bs-target="#users"]').click();
      await loadUsers();
    } catch (error) {
      console.error('Error adding user:', error);
      alert('Failed to add user');
    }
  });

  // Редактирование пользователя
  async function editUser(id) {
    try {
      const response = await fetchWithCsrf(`${API.admin}/user/${id}`);
      if (!response.ok) throw new Error('Failed to load user');
      const user = await response.json();

      document.getElementById('editId').value = user.id;
      document.getElementById('editFirstName').value = user.firstName || '';
      document.getElementById('editLastName').value = user.lastName || '';
      document.getElementById('editAge').value = user.age;
      document.getElementById('editEmail').value = user.email;
      document.getElementById('editPassword').value = '';

      const editRoles = document.getElementById('editRoles');
      Array.from(editRoles.options).forEach(opt => {
        opt.selected = user.roles && user.roles.some(r => r.id === parseInt(opt.value));
      });

      new bootstrap.Modal(document.getElementById('editModal')).show();
    } catch (error) {
      console.error('Error loading user for edit:', error);
      alert('Failed to load user data');
    }
  }

  document.getElementById('saveEditBtn').addEventListener('click', async () => {
    const id = document.getElementById('editId').value;
    const selectedRoles = Array.from(document.getElementById('editRoles').selectedOptions)
            .map(opt => ({ id: parseInt(opt.value), name: 'ROLE_' + opt.textContent }));

    const userData = {
      firstName: document.getElementById('editFirstName').value,
      lastName: document.getElementById('editLastName').value || '',
      age: parseInt(document.getElementById('editAge').value),
      email: document.getElementById('editEmail').value,
      password: document.getElementById('editPassword').value,
      roles: selectedRoles
    };

    try {
      const response = await fetchWithCsrf(`${API.admin}/users/${id}`, {
        method: 'PUT',
        body: JSON.stringify(userData)
      });

      if (!response.ok) throw new Error('Failed to update user');

      bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
      await loadUsers();
    } catch (error) {
      console.error('Error updating user:', error);
      alert('Failed to update user');
    }
  });

  // Удаление пользователя
  async function deleteUser(id) {
    try {
      const response = await fetchWithCsrf(`${API.admin}/user/${id}`);
      if (!response.ok) throw new Error('Failed to load user');
      const user = await response.json();

      document.getElementById('deleteId').value = user.id;
      document.getElementById('deleteFirstName').textContent = user.firstName || '';
      document.getElementById('deleteLastName').textContent = user.lastName || '-';
      document.getElementById('deleteAge').textContent = user.age;
      document.getElementById('deleteEmail').textContent = user.email;
      document.getElementById('deleteRole').textContent = user.roles ?
              user.roles.map(r => r.name.replace('ROLE_', '')).join(' ') : '';

      new bootstrap.Modal(document.getElementById('deleteModal')).show();
    } catch (error) {
      console.error('Error loading user for delete:', error);
      alert('Failed to load user data');
    }
  }

  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    const id = document.getElementById('deleteId').value;
    try {
      const response = await fetchWithCsrf(`${API.admin}/users/${id}`, {
        method: 'DELETE'
      });

      if (!response.ok) throw new Error('Failed to delete user');

      bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
      await loadUsers();
    } catch (error) {
      console.error('Error deleting user:', error);
      alert('Failed to delete user');
    }
  });

  function attachEventListeners() {
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => editUser(btn.dataset.id));
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteUser(btn.dataset.id));
    });
  }

  // Инициализация
  document.addEventListener('DOMContentLoaded', async () => {
    await loadCurrentUser();
    await loadRoles();
    await loadUsers();
  });
</script>
</body>
</html>
